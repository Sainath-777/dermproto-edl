seed: 42
backbone:
  name: "dinov2_vits14"
  pretrained: true
  freeze: true
  embedding_dim: 384

episode:
  k_way: 5
  n_shot: 5
  n_query: 15
  distance_metric: "euclidean"
  num_eval_episodes: 600

edl:
  hidden_dim: 64
  use_dispersion: true

dataset:
  name: "isic2019"
  eval_classes: ["MEL", "NV", "BCC", "AK", "BKL", "DF", "VASC", "SCC"]
  mode: "all"

paths:
  data_raw: "data/raw"
  checkpoints: "experiments/phase4_checkpoints"
  output_dir: "experiments/phase7_results/isic2019"
  kaggle_ham10000: "/kaggle/input/datasets/kmader/skin-cancer-mnist-ham10000"
  kaggle_isic2019: "/kaggle/input/datasets/salviohexia/isic-2019-skin-lesion-images-for-classification"

wandb:
  project: "dermproto-edl"
  entity: null
  run_name: "phase7_isic2019"